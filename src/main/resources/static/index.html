<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynaPart-TP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#12121a', 700: '#1a1a25', 600: '#242430' },
                        accent: { blue: '#3b82f6', cyan: '#06b6d4', violet: '#8b5cf6' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%); min-height: 100vh; }

        /* Grid pattern overlay */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; z-index: 1;
        }

        .glass-card {
            background: rgba(26, 26, 37, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-value {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .pool-row { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pool-row:hover { background: rgba(255, 255, 255, 0.02); }

        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        header { position: relative; }
        header::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.5), rgba(6,182,212,0.5), transparent);
        }

        .logo-icon { animation: logo-glow 3s ease-in-out infinite; }
        @keyframes logo-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59,130,246,0.3), 0 0 40px rgba(6,182,212,0.2); }
            50% { box-shadow: 0 0 30px rgba(59,130,246,0.5), 0 0 60px rgba(6,182,212,0.3); }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .refresh-btn:hover i { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .stat-number { display: inline-block; transition: transform 0.3s ease; }
        .glass-card:hover .stat-number { transform: scale(1.05); }

        .monitor-link { position: relative; overflow: hidden; }
        .monitor-link::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(6,182,212,0.2));
            opacity: 0; transition: opacity 0.3s ease;
        }
        .monitor-link:hover::before { opacity: 1; }

        #app { position: relative; z-index: 2; }

        /* Table specific styles */
        table { table-layout: fixed; }
        th, td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body class="text-white antialiased">
    <div class="grid-overlay"></div>
    <div id="app" class="min-h-screen">
        <header class="border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="logo-icon w-10 h-10 rounded-xl bg-gradient-to-br from-accent-blue to-accent-cyan flex items-center justify-center">
                            <i class="fa fa-layer-group text-white text-lg"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-semibold tracking-tight">DynaPart-TP</h1>
                            <p class="text-xs text-white/40">Dynamic Thread Pool Manager</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="flex items-center gap-2 text-sm text-white/50">
                            <span id="current-time" class="font-mono">--:--:--</span>
                        </div>
                        <div id="ws-indicator" class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-white/20"></span>
                            <span class="text-xs text-white/40">Offline</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="glass-card rounded-2xl p-5 fade-in stagger-1">
                    <div class="flex items-start justify-between">
                        <div>
                            <p class="text-xs text-white/40 uppercase tracking-wider mb-2">Thread Pools</p>
                            <p id="stat-pools" class="stat-number text-3xl font-bold stat-value">0</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-accent-blue/10 flex items-center justify-center">
                            <i class="fa fa-grip text-accent-blue"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-5 fade-in stagger-2">
                    <div class="flex items-start justify-between">
                        <div>
                            <p class="text-xs text-white/40 uppercase tracking-wider mb-2">Total Threads</p>
                            <p id="stat-threads" class="stat-number text-3xl font-bold stat-value">0</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-accent-cyan/10 flex items-center justify-center">
                            <i class="fa fa-spinner text-accent-cyan"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-5 fade-in stagger-3">
                    <div class="flex items-start justify-between">
                        <div>
                            <p class="text-xs text-white/40 uppercase tracking-wider mb-2">Queued Tasks</p>
                            <p id="stat-queued" class="stat-number text-3xl font-bold stat-value">0</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-accent-violet/10 flex items-center justify-center">
                            <i class="fa fa-list-ol text-accent-violet"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-5 fade-in stagger-4">
                    <div class="flex items-start justify-between">
                        <div>
                            <p class="text-xs text-white/40 uppercase tracking-wider mb-2">Partitions</p>
                            <p id="stat-partitions" class="stat-number text-3xl font-bold stat-value">0</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center">
                            <i class="fa fa-th-large text-emerald-500"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden fade-in-up stagger-5">
                <div class="px-6 py-4 border-b border-white/5">
                    <div class="flex items-center justify-between">
                        <h2 class="text-lg font-medium">Registered Pools</h2>
                        <button onclick="loadPools()" class="refresh-btn text-xs text-white/40 hover:text-white/70 transition-colors flex items-center gap-2">
                            <i class="fa fa-refresh"></i> Refresh
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[1000px]">
                        <thead>
                            <tr class="text-xs text-white/40 uppercase tracking-wider">
                                <th class="px-3 py-3 text-left font-medium w-[100px]">Type</th>
                                <th class="px-3 py-3 text-left font-medium w-[140px]">Name</th>
                                <th class="px-3 py-3 text-center w-[60px]">Core</th>
                                <th class="px-3 py-3 text-center w-[60px]">Max</th>
                                <th class="px-3 py-3 text-left w-[100px]">Queue</th>
                                <th class="px-3 py-3 text-left w-[100px]">Reject</th>
                                <th class="px-3 py-3 text-center w-[70px]">Daemon</th>
                                <th class="px-3 py-3 text-center w-[80px]">Action</th>
                            </tr>
                        </thead>
                        <tbody id="pool-table" class="divide-y divide-white/5">
                            <tr>
                                <td colspan="9" class="px-4 py-16 text-center text-white/30">
                                    <div class="flex flex-col items-center gap-3">
                                        <i class="fa fa-circle-notch fa-spin text-2xl"></i>
                                        <span class="text-sm">Loading...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}`;
        let poolsData = [];

        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();

        function loadPools() {
            fetch(`${API_BASE}/monitor/pools`)
                .then(res => { if (!res.ok) throw new Error('Network error'); return res.json(); })
                .then(pools => { poolsData = pools; updateStats(pools); renderPools(pools); })
                .catch(err => {
                    console.error('Failed to load pools:', err);
                    document.getElementById('pool-table').innerHTML = `
                        <tr><td colspan="9" class="px-4 py-16 text-center text-red-400/60">
                            <div class="flex flex-col items-center gap-3">
                                <i class="fa fa-exclamation-circle text-2xl"></i>
                                <span class="text-sm">Failed to load pools</span>
                            </div>
                        </td></tr>`;
                });
        }

        function updateStats(pools) {
            document.getElementById('stat-pools').textContent = pools.length;
            let totalThreads = 0, totalQueued = 0, totalPartitions = 0;

            const promises = pools.map(pool =>
                fetch(`${API_BASE}/monitor/pool?tpName=${encodeURIComponent(pool.poolName)}`)
                    .then(res => res.json())
                    .then(info => { totalThreads += (info.coreNums || 0) + (info.maxNums || 0); })
                    .catch(() => {})
            );

            const taskPromises = pools.map(pool =>
                fetch(`${API_BASE}/monitor/tasks?tpName=${encodeURIComponent(pool.poolName)}`)
                    .then(res => res.json())
                    .then(count => { totalQueued += count; })
                    .catch(() => {})
            );

            const partitionPromises = pools.map(pool =>
                fetch(`${API_BASE}/monitor/queue?tpName=${encodeURIComponent(pool.poolName)}`)
                    .then(res => res.json())
                    .then(info => { totalPartitions += (info.partitioning ? info.partitionNum || 1 : 1); })
                    .catch(() => {})
            );

            Promise.all([...promises, ...taskPromises, ...partitionPromises]).then(() => {
                animateValue('stat-threads', totalThreads);
                animateValue('stat-queued', totalQueued);
                animateValue('stat-partitions', totalPartitions);
            });
        }

        function animateValue(elementId, target) {
            const el = document.getElementById(elementId);
            const start = parseInt(el.textContent) || 0;
            const duration = 500;
            const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                el.textContent = Math.round(start + (target - start) * easeOut);
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function getTypeBadge(type) {
            const typeConfig = {
                'cpu': { bg: 'bg-blue-500/20', text: 'text-blue-400', icon: 'fa fa-microchip' },
                'io': { bg: 'bg-cyan-500/20', text: 'text-cyan-400', icon: 'fa fa-exchange-alt' },
                'littleChief': { bg: 'bg-emerald-500/20', text: 'text-emerald-400', icon: 'fa fa-crown' }
            };
            const config = typeConfig[type] || { bg: 'bg-white/10', text: 'text-white/60', icon: 'fa fa-grip' };
            return `<span class="inline-flex items-center gap-1 px-2 py-1 rounded-md ${config.bg} ${config.text} text-xs font-medium">
                <i class="${config.icon}"></i>${type || 'unknown'}
            </span>`;
        }

        function renderPools(pools) {
            const tbody = document.getElementById('pool-table');
            if (!pools || pools.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="px-4 py-16 text-center text-white/30">
                    <div class="flex flex-col items-center gap-3">
                        <i class="fa fa-inbox text-2xl"></i>
                        <span class="text-sm">No thread pools registered</span>
                    </div>
                </td></tr>`;
                return;
            }

            tbody.innerHTML = pools.map((pool, idx) => `
                <tr class="pool-row" style="animation: fadeIn 0.4s ease-out ${idx * 80}ms forwards; opacity: 0;">
                    <td class="px-3 py-3">
                        ${getTypeBadge(pool.type)}
                    </td>
                    <td class="px-3 py-3"><div class="font-medium text-white/90 truncate">${pool.poolName || '-'}</div></td>
                    <td class="px-3 py-3 text-center">
                        <span class="inline-flex items-center justify-center w-10 h-6 rounded-md bg-accent-blue/10 text-accent-blue text-sm font-medium">${pool.coreNums || 0}</span>
                    </td>
                    <td class="px-3 py-3 text-center">
                        <span class="inline-flex items-center justify-center w-10 h-6 rounded-md bg-accent-cyan/10 text-accent-cyan text-sm font-medium">${pool.maxNums || 0}</span>
                    </td>
                    <td class="px-3 py-3 text-sm text-white/60 truncate">${pool.queueName || '-'}</td>
                    <td class="px-3 py-3 text-sm text-white/60 truncate">${pool.rejectStrategyName || '-'}</td>
                    <td class="px-3 py-3 text-center">
                        ${pool.daemon
                            ? '<span class="inline-flex items-center gap-1 text-xs text-emerald-400"><span class="pulse-dot w-1.5 h-1.5 rounded-full bg-emerald-400"></span>Yes</span>'
                            : '<span class="inline-flex items-center gap-1 text-xs text-white/30"><span class="w-1.5 h-1.5 rounded-full bg-white/20"></span>No</span>'
                        }
                    </td>
                    <td class="px-3 py-3 text-center">
                        <a href="/detail.html?poolName=${encodeURIComponent(pool.poolName)}"
                           class="monitor-link inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-sm text-white/70 hover:text-white transition-all">
                            <i class="fa fa-chart-line text-xs"></i> Monitor
                        </a>
                    </td>
                </tr>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => { loadPools(); setInterval(loadPools, 30000); });
    </script>
</body>
</html>
